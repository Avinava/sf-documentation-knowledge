name: Release & Publish

# Trigger on version tags (push v1.0.0, v1.2.3, etc.)
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # For creating GitHub releases
      id-token: write  # For npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify package version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "❌ package.json version ($PKG_VERSION) doesn't match tag (v${{ steps.version.outputs.VERSION }})"
            exit 1
          fi
          echo "✅ Version verified: $PKG_VERSION"

      - name: Verify MCP server starts
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0.0"}}}' | timeout 15 node dist/mcp/server.js 2>/dev/null | grep -q '"serverInfo"'
          echo "✅ MCP server verified"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## Install
            ```bash
            npm install @sfdxy/sf-documentation-knowledge@${{ steps.version.outputs.VERSION }}
            ```

            ## MCP Server Setup (Claude Desktop)
            Add to `~/Library/Application Support/Claude/claude_desktop_config.json`:
            ```json
            {
              "mcpServers": {
                "sf-docs": {
                  "command": "npx",
                  "args": ["-y", "@sfdxy/sf-documentation-knowledge@${{ steps.version.outputs.VERSION }}"]
                }
              }
            }
            ```

            ## Available MCP Tools
            | Tool | Purpose |
            |---|---|
            | `sf_search` | Search across 121 SF documentation domains |
            | `sf_read_topic` | Read a specific documentation topic |
            | `sf_graph_query` | Navigate the knowledge graph |
            | `sf_list_domains` | List all available domains |
            | `sf_apex_lookup` | Look up Apex classes |

            See [README.md](https://github.com/Avinava/sf-documentation-knowledge#readme) for full documentation.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
